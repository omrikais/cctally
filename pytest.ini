[pytest]
# Repo-level pytest config (#279 S7 W4). Deliberately minimal — it must not
# change behavior for direct `pytest` users or for `bin/cctally-test-all`, which
# keeps passing `-q -rfE` explicitly (byte-compatible).
#
# Markers: only pytest built-ins (parametrize / skip / skipif) are used across
# the suite — there are no custom markers to register, and none are registered
# speculatively.
#
# filterwarnings: conservative — keep pytest's DEFAULT warning behavior. No
# `error` escalation (which could fail the suite on an unrelated dependency
# warning) and no broad ignores (which could mask a real regression). Nothing is
# load-bearing enough to pin today; add a specific `ignore::...` line only when a
# concrete warning is proven noise.
filterwarnings =
    default
#
# NOTE: no `timeout =` key here on purpose. With pytest-timeout absent (the
# stdlib-only local default) an ini `timeout` key emits a PytestConfigWarning on
# every run. bin/cctally-test-all instead passes `--timeout=` ONLY when the
# plugin is importable (see its Phase 3), so plugin-less runs stay silent.
