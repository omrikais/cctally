name: CI

on:
  push:
    branches: [main]
    # Skip docs-only pushes — every job here is code/test focused, and
    # CHANGELOG / README / CLAUDE.md / docs/**/*.md churn doesn't change
    # any test outcome. `paths-ignore` evaluates per push: if EVERY
    # changed file matches, the workflow is skipped; a mixed code+docs
    # push still runs.
    paths-ignore:
      - '**/*.md'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**/*.md'

jobs:
  # test-linux (hosted ubuntu) was disabled to save GH Actions minutes —
  # the self-hosted macOS runner covers push-to-main validation. Trade-off:
  # PRs no longer have a CI gating signal (test-macos / dashboard-build-
  # stability are push-only for fork-PR safety). Re-enable if PR gating
  # becomes load-bearing again.

  test-macos:
    # Self-hosted runners must NOT execute fork-PR code on the maintainer's
    # machine (a public-mirror exposure once the repo goes public — fork
    # contributors could run arbitrary build/test scripts on the host).
    # Push to main is the maintainer's own commits, so it's safe to run
    # there. Loosen later (e.g. allow same-repo PRs) only with deliberate
    # vetting.
    if: github.event_name == 'push' && github.repository == 'omrikais/cctally-dev'
    runs-on: [self-hosted, macOS, cctally]
    # Real headroom over observed wall-clock (the full suite runs in ~3 min) so
    # a hung test can't wedge this job for GitHub's default 6h (#279 S7 W4).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      # `bin/cctally-share-v2-test` runs a Vitest-based GUI smoke
      # (`dashboard/web/src/share/ShareManualSmoke.test.tsx`) via
      # `npm test` from `dashboard/web/`, which needs the workspace's
      # `node_modules/.bin/vitest` on disk. Without these two steps the
      # smoke fails with `sh: vitest: command not found` on a fresh
      # runner checkout (the share-v2 harness counts that as a hard
      # failure). Mirrors the setup-node + `npm ci` pair the
      # `dashboard-build-stability` job already uses.
      - name: Setup Node (per .nvmrc)
        uses: actions/setup-node@v5
        with:
          node-version-file: dashboard/web/.nvmrc
          cache: npm
          cache-dependency-path: dashboard/web/package-lock.json

      - name: Install dashboard deps (vitest for share-v2 smoke)
        working-directory: dashboard/web
        run: npm ci

      - name: Run cctally test suite
        env:
          # Pin Python to brew's 3.13 by prepending its libexec/bin (where
          # python3 -> python3.13 symlinks live) so the runner's PATH —
          # which may include pyenv shims pointing at older system Python —
          # doesn't shadow it. Also drop the runner's tool-cache entries
          # that some Actions toolchains inject ahead of brew.
          PATH: /opt/homebrew/opt/python@3.13/libexec/bin:/opt/homebrew/bin:/usr/bin:/bin:/usr/sbin:/sbin
          # Cap the parallel-harness fan-out below the Mac Studio's core
          # count. cctally-test-all defaults to nproc (10 cores here), and
          # at jobs=10 several harnesses spawn enough child cctally
          # processes that `dashboard` fixture servers can't print their
          # port within the harness's wait window. Four leaves headroom
          # for the maintainer's other workloads on the same machine.
          CCTALLY_TEST_JOBS: "4"
        run: |
          set -e
          python3 --version
          # Brew's Python is PEP 668 "externally managed" — `pip install`
          # against the system interpreter is refused. Build a per-job venv
          # so test deps stay isolated from the runner's host Python. The
          # venv is activated for the whole step so bin/cctally's
          # `#!/usr/bin/env python3` shebang resolves to the venv interpreter
          # too (rich + pytest then importable).
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install --upgrade pip pytest pytest-timeout rich
          bin/cctally-test-all

  dashboard-build-stability:
    # Same self-hosted-on-public-PR exposure as test-macos above. Push-only
    # gating keeps fork PRs off the maintainer's machine; the byte-stable
    # rebuild check still runs on every push to main.
    if: github.event_name == 'push' && github.repository == 'omrikais/cctally-dev'
    runs-on: [self-hosted, macOS, cctally]  # committed bytes were generated on macOS; native bindings vary by OS
    timeout-minutes: 20  # npm ci + vite build; headroom over the observed few-min run (#279 S7 W4)
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node (per .nvmrc)
        uses: actions/setup-node@v5
        with:
          node-version-file: dashboard/web/.nvmrc
          cache: npm
          cache-dependency-path: dashboard/web/package-lock.json

      - name: Install dashboard deps
        working-directory: dashboard/web
        run: npm ci

      # Full frontend unit-test estate (#281 S2 / #280 R2 finding 6):
      # before this step only the single-file share smoke ran in CI (via
      # cctally-test-all's share-v2 harness). Runs before the build so a
      # test failure is attributed distinctly from a build/byte failure.
      - name: Run frontend unit tests (full vitest estate)
        working-directory: dashboard/web
        run: npx vitest run

      - name: Build dashboard
        working-directory: dashboard/web
        run: npm run build

      - name: Verify dashboard/static/ is byte-stable
        run: git diff --exit-code dashboard/static/

  test-pr:
    # PR signal lane (#281 S2 / #280 R2): same-repo PRs get checks
    # everywhere; fork PRs additionally run on the public mirror
    # (omrikais/cctally) where GH-hosted sandboxing makes fork code safe
    # (read-only token, no secrets) and minutes are free. Fork PRs to the
    # PRIVATE repo never run (and outsiders can't fork a private repo
    # anyway). The self-hosted jobs above stay push-only — never loosen
    # those. This lane is a SIGNAL, not merge enforcement: no
    # branch-protection required checks (they'd reject the direct-push
    # merge-back flow and strand md-only PRs on path-filtered checks).
    if: >-
      github.event_name == 'pull_request' &&
      (github.event.pull_request.head.repo.full_name == github.repository ||
       github.repository == 'omrikais/cctally')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    concurrency:
      group: test-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    env:
      CCTALLY_TEST_JOBS: "2"                            # dashboard fixture servers need port-print headroom
      LC_ALL: "C.UTF-8"                                 # deterministic encoding/collation
      TZ: "Etc/UTC"                                     # repo gotcha: Etc/UTC, not UTC
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false                    # PR lane never needs a persisted token
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - uses: actions/setup-node@v5
        with:
          node-version-file: 'dashboard/web/.nvmrc'
          cache: npm
          cache-dependency-path: dashboard/web/package-lock.json
      - name: Assert required CLI tools present
        run: |
          # Harnesses shell out to these (jq: dashboard/migrations goldens;
          # column: table renders; ps: legacy-poller ownership probe; bc:
          # arithmetic; sqlite3: 5h/migrations state dumps). ubuntu-latest
          # ships them all — assert (with a best-effort install fallback) so a
          # future image dropping one FAILS LOUDLY here rather than surfacing
          # as a confusing golden mismatch deep in the suite (issue #132: a
          # missing `jq` masqueraded as 36 phantom dashboard failures locally).
          missing=""
          for t in sqlite3 jq column ps bc; do
            command -v "$t" >/dev/null 2>&1 || missing="$missing $t"
          done
          if [ -n "$missing" ]; then
            echo "::warning::missing CLI tools$missing — installing"
            sudo apt-get update -qq
            sudo apt-get install -y -qq sqlite3 jq bsdmainutils procps bc
          fi
          sqlite3 --version
      - name: Install Python test deps
        run: python -m pip install --upgrade pip pytest pytest-xdist pytest-timeout rich
      # Unlike ci-linux-matrix (which deliberately skips npm ci), this lane
      # installs dashboard deps: vitest needs them, and the share-v2 smoke
      # inside cctally-test-all then runs against a real vitest.
      - name: Install dashboard deps (vitest + share smoke)
        working-directory: dashboard/web
        run: npm ci
      - name: Run cctally test suite
        run: bin/cctally-test-all
      - name: Run frontend unit tests (full vitest estate)
        working-directory: dashboard/web
        run: npx vitest run
