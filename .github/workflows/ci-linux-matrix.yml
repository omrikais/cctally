name: CI (Linux multi-version)
on:
  push:
    tags: ['v*']
  schedule:
    - cron: '29 7 * * 4'    # weekly Thu 07:29 UTC — offset off pricing-freshness's Mon 09:17
  workflow_dispatch: {}
jobs:
  test-linux:
    if: github.repository == 'omrikais/cctally-dev'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    env:
      CCTALLY_TEST_JOBS: "2"
      LC_ALL: "C.UTF-8"
      TZ: "Etc/UTC"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '${{ matrix.python-version }}'
      # Required (NOT dead weight): cctally-test-all glob-runs every bin/cctally-*-test,
      # and cctally-npm-shim-test / cctally-npm-postinstall-test hard-fail (exit 1) without
      # the `node` binary. We do NOT run `npm ci` — the vitest share smoke is OS-agnostic and
      # covered on the macOS push gate; this matrix's value is the Python-interpreter axis.
      - uses: actions/setup-node@v4
        with:
          node-version-file: 'dashboard/web/.nvmrc'
      - name: Assert sqlite3 CLI present
        run: sqlite3 --version
      - name: Install Python test deps
        run: python -m pip install --upgrade pip pytest pytest-xdist rich
      - name: Run the suite
        run: bin/cctally-test-all
