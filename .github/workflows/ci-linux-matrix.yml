name: CI (Linux multi-version)
on:
  push:
    tags: ['v*']            # post-tag validation of the shipped artifact (fires on the public mirror; #131)
  schedule:
    - cron: '29 7 * * 4'    # weekly Thu 07:29 UTC (public mirror) — offset off pricing-freshness's Mon 09:17
  workflow_dispatch: {}     # manual pre-cut/pre-merge gate (private source — validates an unpublished branch)
jobs:
  test-linux:
    # Free Actions minutes, split by repo (#131):
    #   * public mirror (omrikais/cctally) — runs on ALL triggers (tags +
    #     weekly cron + dispatch). GH-hosted minutes are free on public repos,
    #     and this validates exactly the shipped artifact users npm/brew-install.
    #   * private source (omrikais/cctally-dev) — runs ONLY on a manual
    #     workflow_dispatch (the pre-cut/pre-merge gate for an UNPUBLISHED branch
    #     the public mirror can't see). Tag pushes + the weekly cron skip here
    #     (job `if` false → 0 billable minutes), so they accrue no paid private
    #     Actions cost. The private superset (release/mirror harnesses) stays
    #     covered by the self-hosted macOS push-CI in ci.yml.
    if: >-
      github.repository == 'omrikais/cctally' ||
      (github.repository == 'omrikais/cctally-dev' && github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 60  # headroom over the observed run so a hung test can't wedge the job for GitHub's default 6h (#279 S7 W4)
    strategy:
      fail-fast: false                                 # see all three results
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    env:
      CCTALLY_TEST_JOBS: "2"                            # outer budget; derived inner cap = min(4,2)=2, release auto-capped via the runner (#292)
      LC_ALL: "C.UTF-8"                                 # deterministic encoding/collation
      TZ: "Etc/UTC"                                     # repo gotcha: Etc/UTC, not UTC
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '${{ matrix.python-version }}'
      # Required (NOT dead weight): cctally-test-all glob-runs every bin/cctally-*-test,
      # and cctally-npm-shim-test / cctally-npm-postinstall-test hard-fail (exit 1) without
      # the `node` binary. We do NOT run `npm ci` — the vitest share smoke is OS-agnostic and
      # covered on the macOS push gate; this matrix's value is the Python-interpreter axis.
      - uses: actions/setup-node@v5
        with:
          node-version-file: 'dashboard/web/.nvmrc'
      - name: Install recovery-capable SQLite CLI
        run: .github/scripts/install-recovery-sqlite.sh "$RUNNER_TEMP/cctally-sqlite"
      - name: Assert required CLI tools present
        run: |
          # Harnesses shell out to these (jq: dashboard/migrations goldens;
          # column: table renders; ps: legacy-poller ownership probe; bc:
          # arithmetic; sqlite3: 5h/migrations state dumps + db repair). The
          # prior step pins the official recovery-capable SQLite shell; assert
          # the remaining tools (with a best-effort install fallback) so a
          # future image dropping one FAILS LOUDLY here rather than surfacing
          # as a confusing golden mismatch deep in the suite (issue #132: a
          # missing `jq` masqueraded as 36 phantom dashboard failures locally).
          missing=""
          for t in sqlite3 jq column ps bc; do
            command -v "$t" >/dev/null 2>&1 || missing="$missing $t"
          done
          if [ -n "$missing" ]; then
            echo "::warning::missing CLI tools$missing — installing"
            sudo apt-get update -qq
            sudo apt-get install -y -qq sqlite3 jq bsdmainutils procps bc
          fi
          sqlite3 --version
          sqlite3 :memory: '.recover' >/dev/null
      - name: Install Python test deps
        run: python -m pip install --upgrade pip pytest pytest-xdist pytest-timeout rich
      - name: Run the suite
        run: bin/cctally-test-all
