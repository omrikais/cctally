name: npm publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    # The workflow file is mirrored to the public repo (omrikais/cctally),
    # which has the npm OIDC trusted-publisher relationship. The same tag
    # push in the private mirror source (omrikais/cctally-dev) would also
    # trigger this workflow, but the private repo has no trusted-publisher
    # binding — `npm publish` would 404 with a noisy failure notification
    # on every release. Gate the job so it no-ops on the private repo.
    if: github.repository == 'omrikais/cctally'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify package.json version matches tag
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package.json version $pkg_version"
            exit 1
          fi

      - name: Derive dist-tag
        id: tag
        run: |
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            echo "dist=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: npm publish
        run: npm publish --provenance --access public --tag '${{ steps.tag.outputs.dist }}'
